stages:
  - install
  - build
  - deploy

variables:
  NODE_ENV: production
  CACHE_DIR: .npm

cache:
  paths:
    - node_modules/
    - $CACHE_DIR/

install:
  stage: install
  image: node:20-alpine
  script:
    - echo "📦 Installing dependencies..."
    - npm ci
  artifacts:
    paths:
      - node_modules/

build:
  stage: build
  image: node:20-alpine
  script:
    - echo "🏗️ Building React app (Vite)..."
    - npm run build
  artifacts:
    paths:
      - dist/
  dependencies:
    - install

pages:
  stage: deploy
  image: node:20-alpine
  script:
    - echo "🚀 Deploying to GitLab Pages"
    - mv dist public
  artifacts:
    paths:
      - public
  only:
    - develop
  dependencies:
    - build
